<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number - Abhijit'sCodeLab</title>
    <link rel="shortcut icon" href="image/favicon.png" type="png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div>
        <div class="top-section">
            <img src="image/guess_image.png" alt="guess-game-img" class="guess-game-img" >
            <p class="text-center game-description">
                Find out the right number between 1 to 100.
            </p>
            <div class="row justify-content-center mx-0">
                <div class="col-11 col-sm-10 col-md-8 col-lg-7 col-xl-6 text-center guess-bg-container">
                    <h1 class="guess-heading">
                        Guess The Number
                        <img src="image/guess-number-img.png" alt="guessImageEmozi" class="guess-number-image">
                    </h1>
                    <input type="text" class="user-input" id="userInput" />
                    <div class="button-container">
                        <button class="check-guess" onclick="OnCheckGuess()">Check</button>
                        <button class="reset-btn" onclick="onReset()">Reset</button>
                    </div>
                    <p class="game-result" id="gameResult"></p>
                </div>
            </div>
        </div>
        <div class="footer-bg">
            <footer class="footer">
                <h3>Guess The Number 🎯</h3>
                <p>Challenge yourself and find the number between 1 and 100!</p>
                <p>&copy; 2026 Guesing Game By Abhijit's Code Lab</p>
            </footer>
        </div>
        <script src="script.js" defer></script>
    </body>
</html>
